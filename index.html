    <meta
      name="description"
      content="Edit Wiremark wireframes locally in your browser or as a desktop PWA."
    />
    <title>Wiremark Editor</title>
    <script>
      // Capture the PWA install prompt as early as possible. Chrome can fire
      // `beforeinstallprompt` before the React app mounts, so a listener added
      // only inside the app would miss it. We stash the event on `window` here
      // and `useInstallPrompt` adopts it on mount (and clears it once spent).
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__wmDeferredInstallPrompt = e;
      });
      window.addEventListener('appinstalled', function () {
        window.__wmDeferredInstallPrompt = null;
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
